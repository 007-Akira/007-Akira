  <rect width="1200" height="320" fill="url(#bg)" />
  <rect x="34" y="34" width="1132" height="252" rx="22" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.82" />
  <rect x="52" y="52" width="1096" height="216" rx="16" fill="none" stroke="#f5d36b" stroke-width="1" opacity="0.18" />

